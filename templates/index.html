<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 Air Quality Predictor</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      text-align: center;
    }

    .welcome-card {
      background: rgba(255, 255, 255, 0.95);
      color: #11998e;
      padding: 3rem 2rem;
      border-radius: 20px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.25);
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .btn-primary {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      border-radius: 12px;
      background: linear-gradient(to right, #11998e, #38ef7d);
      border: none;
      transition: transform 0.2s ease-in-out;
      color: #fff;
    }

    .btn-primary:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <h1>🌍 Welcome to the Air Quality Predictor</h1>
    <p>Quickly estimate air quality levels based on environmental parameters like temperature, humidity, pollution levels, and proximity to industrial areas.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Go to Prediction Form 🚀</a>
  </div>
</body>
</html>
