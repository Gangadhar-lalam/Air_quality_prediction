<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 Air Quality Predictor</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>

    /* Page Background */
    body {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Welcome Card */
    .welcome-card {
      background: rgba(255, 255, 255, 0.95);
      color: #11998e;
      padding: 3rem 2.5rem;
      border-radius: 25px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.25);
      max-width: 600px;
      width: 100%;
      animation: slideUp 0.8s ease-in-out;
      transition: 0.3s;
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .welcome-card:hover {
      transform: translateY(-5px);
    }

    /* Title */
    h1 {
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      animation: popIn 1s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Description */
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #444;
      line-height: 1.6;
    }

    /* Button */
    .btn-primary {
      padding: 0.8rem 2.2rem;
      font-size: 1.1rem;
      border-radius: 15px;
      background: linear-gradient(to right, #11998e, #38ef7d);
      border: none;
      transition: all 0.3s ease-in-out;
      color: #fff;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-primary:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

  </style>
</head>

<body>

  <div class="welcome-card">

    <h1>🌍 Welcome to Air Quality Predictor</h1>

    <p>
      Predict real-time air quality based on temperature, humidity,
      pollution levels, and your location.
      Stay informed. Stay safe. 🌱
    </p>

    <a href="{{ url_for('predict_datapoint') }}" class="btn btn-primary">
      Start Prediction 🚀
    </a>

  </div>

</body>
</html>
