<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 Air Quality Prediction</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      animation: fadeInBody 1s ease-in-out;
    }

    @keyframes fadeInBody {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .card {
      width: 100%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      padding: 2rem;
      animation: slideUp 0.8s ease-in-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h2 {
      text-align: center;
      font-weight: bold;
      color: #11998e;
      margin-bottom: 1.5rem;
    }

    .form-control {
      border-radius: 12px;
      padding: 0.6rem;
      transition: 0.3s;
    }

    .form-control:focus {
      box-shadow: 0 0 8px rgba(17, 153, 142, 0.6);
      border-color: #11998e;
    }

    .btn-primary {
      background: linear-gradient(to right, #11998e, #38ef7d);
      border: none;
      border-radius: 12px;
      transition: 0.3s ease-in-out;
    }

    .btn-primary:hover {
      transform: scale(1.05);
    }

    .btn-secondary {
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-secondary:hover {
      transform: scale(1.05);
    }

    .result-box {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      animation: fadeInResult 0.8s ease-in-out;
    }

    @keyframes fadeInResult {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

  </style>
</head>

<body>

<div class="card bg-white">

  <h2>🌍 Air Quality Prediction</h2>

  <button
    type="button"
    class="btn btn-secondary mb-3 w-100"
    onclick="getLiveData()"
  >
    📍 Use My Location
  </button>

  <form action="{{ url_for('predict_datapoint') }}" method="post">

    <input class="form-control mb-2" name="Temperature" placeholder="Temperature" required>
    <input class="form-control mb-2" name="Humidity" placeholder="Humidity" required>
    <input class="form-control mb-2" name="PM2_5" placeholder="PM2.5" required>
    <input class="form-control mb-2" name="PM10" placeholder="PM10" required>
    <input class="form-control mb-2" name="NO2" placeholder="NO2" required>
    <input class="form-control mb-2" name="SO2" placeholder="SO2" required>
    <input class="form-control mb-2" name="CO" placeholder="CO" required>
    <input class="form-control mb-2" name="Proximity_to_Industrial_Areas" placeholder="Proximity" required>
    <input class="form-control mb-3" name="Population_Density" placeholder="Population Density" required>

    <button type="submit" class="btn btn-primary w-100">
      Predict 🚀
    </button>

  </form>

  {% if results %}
    <div class="result-box bg-light">
      Air Quality: {{ results }}
    </div>
  {% endif %}

</div>


<script>
function getLiveData() {

  navigator.geolocation.getCurrentPosition(function(pos){

    fetch("/get_live_data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      })
    })
    .then(res => res.json())
    .then(data => {

      document.querySelector('[name="Temperature"]').value = data.Temperature;
      document.querySelector('[name="Humidity"]').value = data.Humidity;
      document.querySelector('[name="PM2_5"]').value = data.PM2_5;
      document.querySelector('[name="PM10"]').value = data.PM10;
      document.querySelector('[name="NO2"]').value = data.NO2;
      document.querySelector('[name="SO2"]').value = data.SO2;
      document.querySelector('[name="CO"]').value = data.CO;
      document.querySelector('[name="Proximity_to_Industrial_Areas"]').value =
        data.Proximity_to_Industrial_Areas;
      document.querySelector('[name="Population_Density"]').value =
        data.Population_Density;

    });

  });

}
</script>

</body>
</html>
